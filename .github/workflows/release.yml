name: Release

# Cuts a GitHub Release for v* tags. Builds a single consolidated
# install.yaml (CRDs + RBAC + Deployment, with IMG pinned to the
# tag's container image) and attaches it as a release asset, so users
# can install the controller without cloning the repo:
#
#   kubectl apply -f https://github.com/gke-demos/workload-resizer/releases/download/<tag>/install.yaml
#
# Image build runs in parallel via image.yml on the same tag push;
# briefly after a tag is cut the install.yaml may reference an image
# that's still publishing. The kubelet retries ImagePullBackOff so
# this resolves itself within ~5 min — long enough that we don't
# bother with cross-workflow coordination.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build the installer against (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write   # required to create the release + upload assets

env:
  GO_VERSION: '1.26'
  REGISTRY: ghcr.io

jobs:
  release:
    name: build installer & create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Resolve tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          # Strip a leading "v" for the docker tag (semver tags ship as
          # `1.2.3` on ghcr.io per docker/metadata-action's default).
          docker_tag="${tag#v}"
          echo "tag=${tag}"               >> "$GITHUB_OUTPUT"
          echo "docker_tag=${docker_tag}" >> "$GITHUB_OUTPUT"

      - name: Build install.yaml + ship sample config.yaml
        run: |
          IMG="${REGISTRY}/${GITHUB_REPOSITORY}:${{ steps.tag.outputs.docker_tag }}"
          echo "Building installer with IMG=${IMG}"
          make build-installer IMG="${IMG}"
          # Ship the sample ConfigMap as a separate release asset so users get
          # a working-out-of-the-box starting point without cloning the repo,
          # and so the *real* (user-customized) config survives a future
          # `kubectl apply -f install.yaml` upgrade.
          cp config/samples/configmap.yaml dist/config.yaml
          ls -la dist/install.yaml dist/config.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/install.yaml
            dist/config.yaml
          body: |
            ## Install

            Two manifests, applied in order:

            ```bash
            # 1. Namespace + ConfigMap (node-type performance units + bounds).
            #    Edit this before applying for production — the shipped sample
            #    lists GKE machine families; tweak nodeTypes for your cluster.
            #    Apply BEFORE install.yaml so the controller pod (step 2)
            #    finds its required ConfigMap already in place.
            kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/config.yaml

            # 2. Controller (RBAC, Deployment). Idempotent across upgrades.
            kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/install.yaml
            ```

            Reverse the order and the controller pod fails fast on
            startup (`CrashLoopBackOff` with `initial config load:
            configmaps ... not found`) until the ConfigMap lands and
            the kubelet's restart backoff times out. See
            [the install page](https://gke-demos.github.io/workload-resizer/docs/install/)
            for how to inventory your cluster's machine families and customize.

            ### Assets

            - `install.yaml` — controller manifests, pinned to
              `${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.tag.outputs.docker_tag }}`.
            - `config.yaml` — sample `ConfigMap` (schema reference; edit
              before production use).

            > **Note**: the container image is built by the `Image`
            > workflow on the same tag push. If you apply this release
            > immediately and see `ImagePullBackOff`, give the kubelet a
            > few minutes to retry — the image build typically finishes
            > within ~5 minutes of the tag being pushed.
