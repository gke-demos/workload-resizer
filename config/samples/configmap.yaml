# Ship the namespace alongside the ConfigMap so this file can be applied
# *before* install.yaml — applying config first means the controller pod
# never starts up to find the ConfigMap missing (which fails fast into
# CrashLoopBackOff). install.yaml also declares the namespace; kubectl
# apply is idempotent on it.
apiVersion: v1
kind: Namespace
metadata:
  name: workload-resizer-system
  labels:
    app.kubernetes.io/name: workload-resizer
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workload-resizer-config
  namespace: workload-resizer-system
data:
  config.yaml: |
    # The node type that all Deployment/StatefulSet/etc. resource requests
    # are assumed to be calibrated for. Pods that land on this type are
    # left alone. "Node type" here is the value of the node label named by
    # the controller's --node-type-label flag (default
    # cloud.google.com/machine-family, set by GKE to the machine family
    # like n2d, n4, c3).
    baselineNodeType: n2d

    # Per-node-type performance units. The controller resizes a pod by
    # `original * (baseline.cpuPerf / node.cpuPerf)` (and similarly for memory).
    # Higher perf number = more capable node = smaller request needed.
    # Keys must match the values your nodes carry under --node-type-label.
    nodeTypes:
      n2d: { cpuPerf: 1.0,  memPerf: 1.0 }
      n4:  { cpuPerf: 1.25, memPerf: 1.0 }
      c3:  { cpuPerf: 1.30, memPerf: 1.0 }

    # Absolute floors and ceilings. Resized values are clamped into [min, max].
    bounds:
      cpu:
        min: "50m"
        max: "16"
      memory:
        min: "64Mi"
        max: "32Gi"
